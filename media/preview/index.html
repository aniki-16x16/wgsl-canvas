<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src __CSP_SOURCE__;" />
  <title>WGSL Preview</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #11131a;
      color: #d9deea;
      font-family: "Segoe UI", sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 40%, #222836 0%, #11131a 60%);
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      border: 1px solid #3e465a;
      border-radius: 12px;
      padding: 20px;
      background: rgba(18, 22, 30, 0.8);
      max-width: 520px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .desc {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #b7c0d4;
    }

    .source {
      margin-top: 14px;
      border: 1px solid #2f3648;
      border-radius: 8px;
      background: rgba(8, 11, 16, 0.78);
      color: #a9d1ff;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px;
      text-align: left;
      max-height: 240px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1 class="title" id="status-text">WGSL Preview 已就绪</h1>
      <p class="desc" id="detail-text">等待活动 WGSL 文件...</p>
      <pre class="source" id="source-preview">// waiting for active WGSL document...</pre>
    </section>
  </main>
  <script src="__SCRIPT_URI__"></script>
</body>
</html>
