<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src __CSP_SOURCE__;" />
  <title>WGSL Preview</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      padding: 0;
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0a0d14;
      color: #d9deea;
      font-family: "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 40%, #1d2435 0%, #0a0d14 60%);
    }

    .gpu-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(8, 12, 20, 0.6);
      backdrop-filter: blur(4px);
      padding: 20px;
      box-sizing: border-box;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-card {
      width: min(680px, calc(100% - 40px));
      border: 1px solid #3e465a;
      border-radius: 12px;
      padding: 20px;
      background: rgba(18, 22, 30, 0.9);
      text-align: center;
    }

    .title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      color: #eef3ff;
    }

    .desc {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #b7c0d4;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="stage">
    <canvas class="gpu-canvas" id="gpu-canvas"></canvas>
    <section class="overlay" id="overlay">
      <div class="overlay-card">
        <h1 class="title" id="status-text">WGSL Preview 已就绪</h1>
        <p class="desc" id="detail-text">等待活动 WGSL 文件...</p>
      </div>
    </section>
  </main>
  <script src="__SCRIPT_URI__"></script>
</body>
</html>
